    <meta name="description" content="Compare credit cards, home loans, savings and term deposits from 100+ Australian issuers. Filter by fee, rate or feature. Data pulled from each issuer's public CDR feed — refreshed daily." />
    <script type="module">
      const gaId = import.meta.env.VITE_GA_ID;
      if (gaId) {
        const s = document.createElement('script');
        s.async = true;
        s.src = `https://www.googletagmanager.com/gtag/js?id=${gaId}`;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', gaId);
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
