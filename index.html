<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/radar.svg" />

    <!-- Inter font — loaded at runtime by the browser rather than at build
         time by Vite/PostCSS (avoids Vercel builds stalling on the CSS
         @import chain). Preconnect + preload for lowest LCP impact. -->
    <link rel="preconnect" href="https://rsms.me" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />

    <title>RewardRadar — Compare Australian credit cards, home loans & deposits</title>
    <meta name="description" content="Compare credit cards, home loans, savings and term deposits from 100+ Australian issuers. Filter by fee, rate or feature. Data pulled from each issuer's public CDR feed — refreshed daily." />
    <script type="module">
      const gaId = import.meta.env.VITE_GA_ID;
      if (gaId) {
        const s = document.createElement('script');
        s.async = true;
        s.src = `https://www.googletagmanager.com/gtag/js?id=${gaId}`;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', gaId);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Liquid Glass refraction filter. Referenced by `.glass` /
         `.glass-dark` in index.css via `backdrop-filter: url(#lg-displace)`.
         Chromium picks it up and produces the subtle warp on the surface
         behind the glass; Safari/Firefox silently ignore the SVG portion
         of backdrop-filter and fall through to plain blur — no visual
         regression, just a richer effect on Chromium. Rendered at the
         document root so any glass surface anywhere in the app resolves
         the #lg-displace reference. -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <filter id="lg-displace" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.006"
                      numOctaves="2" seed="4" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise"
                           scale="10" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </svg>
  </body>
</html>
